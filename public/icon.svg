<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <!-- Main background gradient: emerald to teal -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>

    <!-- Subtle inner highlight gradient -->
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Icon accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#022c22" flood-opacity="0.25"/>
    </filter>

    <!-- Inner glow for people icon -->
    <filter id="iconGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer rounded rectangle with gradient background -->
  <rect x="4" y="4" width="184" height="184" rx="36" ry="36"
        fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle border stroke -->
  <rect x="4" y="4" width="184" height="184" rx="36" ry="36"
        fill="none" stroke="#34d399" stroke-width="2" stroke-opacity="0.35"/>

  <!-- Top sheen overlay -->
  <rect x="4" y="4" width="184" height="92" rx="36" ry="36"
        fill="url(#sheen)" clip-path="inset(0 0 50% 0 round 36px)"/>
  <rect x="4" y="4" width="184" height="92" rx="36" ry="36"
        fill="url(#sheen)" opacity="0.6"/>
  <rect x="4" y="60" width="184" height="36" fill="url(#sheen)" opacity="0"/>

  <!-- Decorative subtle grid/pattern in background -->
  <circle cx="96" cy="96" r="80" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.06"/>
  <circle cx="96" cy="96" r="60" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.04"/>

  <!-- ===== CREW / TEAM ICON (centered, upper portion) ===== -->
  <g transform="translate(96, 58)" filter="url(#iconGlow)">

    <!-- Center person (front, slightly larger) -->
    <circle cx="0" cy="-14" r="10" fill="white" opacity="0.95"/>
    <path d="M-16,12 Q-16,0 0,-2 Q16,0 16,12 Z" fill="white" opacity="0.9"/>

    <!-- Left person -->
    <circle cx="-24" cy="-10" r="8.5" fill="white" opacity="0.72"/>
    <path d="M-38,14 Q-38,4 -24,2 Q-10,4 -10,14 Z" fill="white" opacity="0.65"/>

    <!-- Right person -->
    <circle cx="24" cy="-10" r="8.5" fill="white" opacity="0.72"/>
    <path d="M10,14 Q10,4 24,2 Q38,4 38,14 Z" fill="white" opacity="0.65"/>

    <!-- Small connecting arc underneath to unify the group -->
    <path d="M-32,14 Q0,24 32,14" fill="none" stroke="#34d399"
          stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- ===== "CMS" TEXT ===== -->
  <text x="96" y="118"
        font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="42" font-weight="800"
        fill="white" text-anchor="middle"
        letter-spacing="4" opacity="0.97">
    CMS
  </text>

  <!-- Subtle underline accent -->
  <line x1="56" y1="128" x2="136" y2="128"
        stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- "CREW" subtitle -->
  <text x="96" y="148"
        font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="600"
        fill="white" text-anchor="middle"
        letter-spacing="5" opacity="0.6">
    CREW
  </text>

  <!-- Corner accent dots (subtle branding detail) -->
  <circle cx="24" cy="170" r="2" fill="#34d399" opacity="0.3"/>
  <circle cx="32" cy="170" r="2" fill="#34d399" opacity="0.2"/>
  <circle cx="168" cy="170" r="2" fill="#34d399" opacity="0.3"/>
  <circle cx="160" cy="170" r="2" fill="#34d399" opacity="0.2"/>
</svg>